function LeadTypeCard({ lt, isActive, onClick }) {

function PhoneScript({ data, subtypes }) {
  const keys = subtypes || ['Default'];
  const [tab, setTab] = useState(keys[0]);
  const script = data[tab];
  if (!script) return null;

  return (
    <div>
      {subtypes && subtypes.length > 1 && (
        <div className="flex gap-4 border-b border-gray-700 mb-4">
          {keys.map(k => (
            <button key={k} onClick={() => setTab(k)}
              className={`pb-2 text-sm ${tab === k ? 'tab-active' : 'tab-inactive'}`}>
              {k}
            </button>
          ))}
        </div>
      )}
      <div className="space-y-4">
        <div>
          <h4 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Opening</h4>
          <div className="script-block bg-gray-900 rounded-lg p-4 text-gray-300">{script.opening}</div>
        </div>
        <div>
          <h4 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Bridge</h4>
          <div className="script-block bg-gray-900 rounded-lg p-4 text-gray-300">{script.bridge}</div>
        </div>
        <div>
          <h4 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Discovery Questions</h4>
          <ul className="space-y-2 ml-1">
            {script.discovery.map((q, i) => (
              <li key={i} className="flex gap-2 text-sm text-gray-300">
                <span className="text-accent font-mono text-xs mt-0.5">{i+1}.</span> {q}
              </li>
            ))}
          </ul>
        </div>
        <div>
          <h4 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Coverage Pitch</h4>
          <div className="script-block bg-gray-900 rounded-lg p-4 text-gray-300">{script.coveragePitch}</div>
        </div>
        <div>
          <h4 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Close</h4>
          <div className="script-block bg-gray-900 rounded-lg p-4 text-yellow-200 font-semibold">{script.close}</div>
        </div>
      </div>
    </div>
  );
}

function ObjectionAccordion({ objections }) {
  const [open, setOpen] = useState(null);
  return (
    <div className="space-y-2">
      {objections.map((obj, i) => (
        <div key={i} className="border border-gray-700 rounded-lg overflow-hidden">
          <button
            onClick={() => setOpen(open === i ? null : i)}
            className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-800/50 transition-colors"
          >
            <span className="text-sm font-medium text-red-400">"{obj.q}"</span>
            <span className="text-gray-500 text-xs ml-2">{open === i ? '\u25b2' : '\u25bc'}</span>
          </button>
          {open === i && (
            <div className="px-4 pb-4 fade-in">
              <div className="bg-gray-900 rounded-lg p-3 mb-2">
                <p className="text-sm text-gray-200 leading-relaxed">{obj.a}</p>
              </div>
              <p className="text-xs text-gray-500 italic">Psychology: {obj.psych}</p>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── AI CALL SIMULATOR ──

const SIMULATOR_API = 'https://api.datasignalai.tech/api/simulator/chat';
const MAX_EXCHANGES = 5;

const PERSONA_NAMES = {
  new_business: 'Maria Rodriguez',
  new_homeowner: 'James Wilson',
  wc_stop_work: 'Tony Marchetti',
  flood_zone: 'Susan Chen',
  marriage: 'David Park',
  building_permit: 'Robert Alvarado',
};

const PERSONA_INTROS = {
  new_business: 'New LLC owner, cleaning service in Miami-Dade. Skeptical of cold calls.',
  new_homeowner: 'Just closed on a $425K home in Broward. Thinks he is fully covered.',
  wc_stop_work: 'Concrete contractor in Hillsborough. Got a stop-work order yesterday.',
  flood_zone: 'Homeowner in flood zone AE, Palm Beach. Paying $2,800/yr NFIP.',
  marriage: 'Just got married in Orange County. Separate auto policies, no life insurance.',
  building_permit: 'Pulled a roofing permit in Hillsborough. Paying $4,200/yr homeowners.',
};

function CallSimulator({ leadTypeId }) {
  const [open, setOpen] = useState(false);
  const [difficulty, setDifficulty] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [exchange, setExchange] = useState(0);
  const [scores, setScores] = useState(null);
  const [error, setError] = useState('');
  const [listening, setListening] = useState(false);
  const [voiceEnabled, setVoiceEnabled] = useState(true);
  const [speaking, setSpeaking] = useState(false);
  const [showCheatSheet, setShowCheatSheet] = useState(false);
  const chatEndRef = useRef(null);
  const recognitionRef = useRef(null);

  // Get the lead type data for cheat sheet
  const ltData = LEAD_TYPES.find(lt => lt.id === leadTypeId);

  // Check if browser supports speech APIs
  const hasSpeechRecognition = typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const hasSpeechSynthesis = typeof window !== 'undefined' && window.speechSynthesis;

  useEffect(() => {
    if (chatEndRef.current) {
      chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [messages, scores]);

  // Speak the AI response aloud
  const speakText = (text) => {
    if (!hasSpeechSynthesis || !voiceEnabled) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1.0;
    utterance.pitch = 1.0;
    // Try to pick a female voice for the prospect
    const voices = window.speechSynthesis.getVoices();
    const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'));
    if (femaleVoice) utterance.voice = femaleVoice;
    utterance.onstart = () => setSpeaking(true);
    utterance.onend = () => setSpeaking(false);
    utterance.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utterance);
  };

  // Auto-send timer: sends message 2s after user stops speaking
  const autoSendTimerRef = useRef(null);
  const latestTranscriptRef = useRef('');

  // Start listening via mic (continuous mode with auto-send)
  const startListening = () => {
    if (!hasSpeechRecognition) {
      setError('Your browser does not support voice input. Try Chrome.');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => setListening(true);
    recognition.onresult = (event) => {
      let transcript = '';
      let isFinal = false;
      for (let i = 0; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
        if (event.results[i].isFinal) isFinal = true;
      }
      setInput(transcript);
      latestTranscriptRef.current = transcript;

      // Reset the auto-send timer on every new speech result
      if (autoSendTimerRef.current) clearTimeout(autoSendTimerRef.current);

      // If we got a final result, start 2s countdown to auto-send
      if (isFinal && transcript.trim()) {
        autoSendTimerRef.current = setTimeout(() => {
          // Stop listening and trigger send
          if (recognitionRef.current) recognitionRef.current.stop();
          setListening(false);
          // Use a small delay so React state updates with final transcript
          setTimeout(() => {
            const sendBtn = document.querySelector('[data-auto-send]');
            if (sendBtn) sendBtn.click();
          }, 100);
        }, 2000);
      }
    };
    recognition.onend = () => {
      setListening(false);
      if (autoSendTimerRef.current) clearTimeout(autoSendTimerRef.current);
    };
    recognition.onerror = (e) => {
      setListening(false);
      if (autoSendTimerRef.current) clearTimeout(autoSendTimerRef.current);
      if (e.error !== 'no-speech' && e.error !== 'aborted') setError('Mic error: ' + e.error);
    };

    recognitionRef.current = recognition;
    recognition.start();
  };

  const stopListening = () => {
    if (autoSendTimerRef.current) clearTimeout(autoSendTimerRef.current);
    if (recognitionRef.current) {
      recognitionRef.current.stop();
    }
    setListening(false);
  };

  const reset = () => {
    setDifficulty(null);
    setMessages([]);
    setInput('');
    setExchange(0);
    setScores(null);
    setError('');
    setLoading(false);
    setListening(false);
    setSpeaking(false);
    if (hasSpeechSynthesis) window.speechSynthesis.cancel();
    if (recognitionRef.current) recognitionRef.current.stop();
  };

  const startCall = (diff) => {
    setDifficulty(diff);
    setMessages([]);
    setExchange(0);
    setScores(null);
    setError('');
  };

  const sendMessage = async () => {
    if (!input.trim() || loading || scores) return;
    const userMsg = input.trim();
    setInput('');
    const newMessages = [...messages, { role: 'user', content: userMsg }];
    setMessages(newMessages);
    setLoading(true);
    setError('');

    try {
      const res = await fetch(SIMULATOR_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          lead_type: leadTypeId,
          difficulty: difficulty,
          user_message: userMsg,
          conversation_history: messages,
          action: 'chat',
        }),
      });
      const data = await res.json();
      if (data.error) {
        setError(data.error);
        setLoading(false);
        return;
      }
      const withReply = [...newMessages, { role: 'assistant', content: data.reply }];
      setMessages(withReply);
      speakText(data.reply);
      const newExchange = exchange + 1;
      setExchange(newExchange);

      if (newExchange >= MAX_EXCHANGES) {
        // Auto-score
        const scoreRes = await fetch(SIMULATOR_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            lead_type: leadTypeId,
            difficulty: difficulty,
            conversation_history: withReply,
            action: 'score',
          }),
        });
        const scoreData = await scoreRes.json();
        if (!scoreData.error) {
          setScores(scoreData);
        } else {
          setError(scoreData.error);
        }
      }
    } catch (e) {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  const personaName = PERSONA_NAMES[leadTypeId] || 'Prospect';
  const personaIntro = PERSONA_INTROS[leadTypeId] || '';

  if (!open) {
    return (
      <button onClick={() => setOpen(true)}

        <span className="text-lg">{'\ud83c\udfa4'}</span> Practice This Call with AI
      </button>
    );
  }

  // Difficulty selection screen
  if (!difficulty) {
    return (
      <div className="mt-4 bg-gray-900/80 border border-gray-700 rounded-xl p-5 fade-in">
        <div className="flex items-center justify-between mb-4">
          <h4 className="text-base font-semibold text-white flex items-center gap-2">
            <span>{'\ud83c\udfa4'}</span> AI Call Simulator
          </h4>
          <button onClick={() => setOpen(false)} className="text-gray-500 hover:text-gray-300 text-sm">Close</button>
        </div>
        <div className="bg-gray-800/50 rounded-lg p-3 mb-4">
          <p className="text-sm text-gray-300"><span className="font-semibold text-white">{personaName}</span> {' \u2014 '} {personaIntro}</p>
        </div>
        <p className="text-sm text-gray-400 mb-3">Choose difficulty level:</p>
        <div className="grid grid-cols-3 gap-3">
          <button onClick={() => { trackEvent('start_simulator', 'simulator', leadTypeId + '_easy'); startCall('easy'); }}
            className="p-3 rounded-lg border border-green-700/50 bg-green-900/20 hover:bg-green-900/40 transition-colors text-center">
            <div className="text-lg mb-1">{'\ud83d\ude0a'}</div>
            <div className="text-sm font-semibold text-green-400">Easy</div>
            <div className="text-xs text-gray-500 mt-0.5">1 mild objection</div>
          </button>
          <button onClick={() => { trackEvent('start_simulator', 'simulator', leadTypeId + '_medium'); startCall('medium'); }}
            className="p-3 rounded-lg border border-yellow-700/50 bg-yellow-900/20 hover:bg-yellow-900/40 transition-colors text-center">
            <div className="text-lg mb-1">{'\ud83e\udd28'}</div>
            <div className="text-sm font-semibold text-yellow-400">Medium</div>
            <div className="text-xs text-gray-500 mt-0.5">2 objections</div>
          </button>
          <button onClick={() => { trackEvent('start_simulator', 'simulator', leadTypeId + '_hard'); startCall('hard'); }}
            className="p-3 rounded-lg border border-red-700/50 bg-red-900/20 hover:bg-red-900/40 transition-colors text-center">
            <div className="text-lg mb-1">{'\ud83d\ude24'}</div>
            <div className="text-sm font-semibold text-red-400">Hard</div>
            <div className="text-xs text-gray-500 mt-0.5">Multiple objections</div>
          </button>
        </div>
      </div>
    );
  }

  // Score card
  if (scores) {
    const total = scores.total || 0;
    const circumference = 2 * Math.PI * 54;
    const offset = circumference - (total / 100) * circumference;
    const scoreColor = total >= 75 ? '#16a34a' : total >= 50 ? '#eab308' : '#ef4444';
    const diffColors = { easy: 'text-green-400 bg-green-900/30', medium: 'text-yellow-400 bg-yellow-900/30', hard: 'text-red-400 bg-red-900/30' };

    return (
      <div className="mt-4 fade-in">
        <div className="rounded-xl overflow-hidden" style={{ background: 'linear-gradient(135deg, #0A1628 0%, #0c2d4a 100%)' }}>
          <div className="p-6">
            <div className="flex items-center justify-between mb-5">
              <div className="flex items-center gap-2">
                <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-900/40 text-blue-400">{leadTypeId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</span>
                <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${diffColors[difficulty] || ''}`}>{difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}</span>
              </div>
              <span className="text-xs text-gray-500">DataSignal AI</span>
            </div>

            <div className="flex flex-col sm:flex-row items-center gap-6 mb-6">
              {/* Score circle */}
              <div className="relative flex-shrink-0">
                <svg width="128" height="128" className="-rotate-90">
                  <circle cx="64" cy="64" r="54" stroke="#1e293b" strokeWidth="8" fill="none" />
                  <circle cx="64" cy="64" r="54" stroke={scoreColor} strokeWidth="8" fill="none"
                    strokeDasharray={circumference} strokeDashoffset={offset}
                    strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s ease' }} />
                </svg>
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="text-3xl font-bold text-white">{total}</span>
                  <span className="text-xs text-gray-400">/ 100</span>
                </div>
              </div>

              {/* Category bars */}
              <div className="flex-1 w-full space-y-3">
                {[
                  { key: 'opening', label: 'Opening', color: '#3b82f6' },
                  { key: 'discovery', label: 'Discovery', color: '#8b5cf6' },
                  { key: 'coverage', label: 'Coverage', color: '#06b6d4' },
                  { key: 'close', label: 'Close', color: '#f59e0b' },
                ].map(cat => (
                  <div key={cat.key}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="text-gray-400">{cat.label}</span>
                      <span className="text-white font-semibold">{scores[cat.key] || 0}/25</span>
                    </div>
                    <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-1000"
                        style={{ width: `${((scores[cat.key] || 0) / 25) * 100}%`, backgroundColor: cat.color }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Feedback */}
            {scores.feedback && (
              <div className="bg-gray-900/60 rounded-lg p-4 mb-4">
                <h5 className="text-xs font-semibold text-accent uppercase tracking-wider mb-2">Coach Feedback</h5>
                <p className="text-sm text-gray-300 leading-relaxed">{scores.feedback}</p>
              </div>
            )}

            {/* Taste Test CTA */}
            <div className="bg-gradient-to-r from-brand/10 to-accent/10 border border-accent/30 rounded-lg p-4 mb-4">
              <p className="text-sm text-white font-semibold mb-1">Want to practice on real leads?</p>
              <p className="text-xs text-gray-400 mb-3">Get 5 exclusive trigger alerts with intelligence briefs, opening scripts, and premium estimates. $29 one-time.</p>
              <a href="../taste-test/" onClick={() => trackEvent('click_taste_test', 'cta', 'post_simulator')}
                className="inline-flex items-center px-4 py-2 bg-accent hover:bg-accentHover text-white text-xs font-semibold rounded-lg transition-colors">
                Try 5 Real Alerts for $29 &rarr;
              </a>
            </div>

            <div className="flex items-center justify-between">
              <span className="text-xs text-gray-600">Share Your Score</span>
              <button onClick={reset}
                className="px-4 py-2 bg-accent hover:bg-accentHover text-white text-sm font-semibold rounded-lg transition-colors">
                New Practice Call
              </button>
            </div>
          </div>
        </div>
      </div>

  return (

      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-700 bg-gray-800/50">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <span className="text-sm font-semibold text-white">Call with {personaName}</span>
          <span className={'text-xs px-2 py-0.5 rounded-full ' + (
            difficulty === 'easy' ? 'bg-green-900/30 text-green-400' :
            difficulty === 'medium' ? 'bg-yellow-900/30 text-yellow-400' :
            'bg-red-900/30 text-red-400'
          )}>{difficulty}</span>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={() => setShowCheatSheet(!showCheatSheet)}
            className={`text-xs px-2 py-1 rounded transition-colors ${showCheatSheet ? 'bg-accent/20 text-accent' : 'text-gray-500 hover:text-gray-300'}`}>
            {showCheatSheet ? 'Hide Script' : 'Show Script'}
          </button>
          <span className="text-xs text-gray-400">Exchange {Math.min(exchange + 1, MAX_EXCHANGES)} of {MAX_EXCHANGES}</span>
          <button onClick={reset} className="text-xs text-gray-500 hover:text-gray-300">End Call</button>
        </div>
      </div>

      {/* Cheat Sheet Panel */}
      {showCheatSheet && ltData && (
        <div className="border-b border-gray-700 bg-gray-800/80 px-4 py-3 max-h-60 overflow-y-auto text-xs">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <h5 className="font-semibold text-accent uppercase tracking-wider mb-2">Phone Script</h5>
              <div className="space-y-2 text-gray-300">

          <div className="text-center py-8">

          </div>

        {messages.map((msg, i) => (

            <div className={`max-w-[80%] rounded-2xl px-4 py-2.5 text-sm leading-relaxed ${
              msg.role === 'user'
                ? 'bg-accent/90 text-white rounded-br-md'
                : 'bg-gray-800 text-gray-200 rounded-bl-md'

              )}
              {msg.content}
            </div>

        ))}
        {loading && (
          <div className="flex justify-start">

                <div className="w-2 h-2 rounded-full bg-gray-500 animate-bounce" style={{ animationDelay: '150ms' }}></div>

            </div>
          </div>

        {error && <p className="text-xs text-red-400 text-center">{error}</p>}
        <div ref={chatEndRef} />
      </div>

      {/* Input */}
      <div className="border-t border-gray-700 p-3">
        <div className="flex gap-2">
          {hasSpeechRecognition && (
            <button
              onClick={listening ? stopListening : startListening}
              disabled={loading || exchange >= MAX_EXCHANGES}
              className={`px-3 py-2.5 rounded-lg text-sm font-semibold transition-all disabled:opacity-40 ${
                listening
                  ? 'bg-red-600 hover:bg-red-500 text-white animate-pulse'
                  : 'bg-gray-700 hover:bg-gray-600 text-gray-300'
              }`}
              title={listening ? 'Stop listening' : 'Speak your response'}>
              {listening ? '\ud83d\udd34' : '\ud83c\udfa4'}
            </button>
          )}
          <input
            type="text"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder={listening ? 'Listening...' : exchange >= MAX_EXCHANGES ? 'Call complete. Scoring...' : 'Type or tap mic to speak...'}
            disabled={loading || exchange >= MAX_EXCHANGES}
            className="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-accent disabled:opacity-50"
          />
          <button onClick={sendMessage} data-auto-send="true"
            disabled={loading || !input.trim() || exchange >= MAX_EXCHANGES}
            className="px-4 py-2.5 bg-accent hover:bg-accentHover disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg transition-colors">
            Send
          </button>
        </div>
        {hasSpeechSynthesis && (
          <div className="flex items-center justify-between mt-2 px-1">
            <div className="flex items-center gap-2">
              <button onClick={() => { setVoiceEnabled(!voiceEnabled); if (speaking) window.speechSynthesis.cancel(); }}
                className="text-xs text-gray-500 hover:text-gray-300 flex items-center gap-1">
                {voiceEnabled ? '\ud83d\udd0a' : '\ud83d\udd07'} {voiceEnabled ? 'Voice on' : 'Voice off'}
              </button>
              {speaking && <span className="text-xs text-blue-400 animate-pulse">Speaking...</span>}
            </div>
            {listening && <span className="text-xs text-red-400 animate-pulse">Listening...</span>}
          </div>
        )}
      </div>

      {/* Progress bar */}
      <div className="h-1 bg-gray-800">
        <div className="h-full bg-accent transition-all duration-500" style={{ width: `${(exchange / MAX_EXCHANGES) * 100}%` }} />
      </div>
    </div>
  );
}

function CrossSellCTA({ activeLT }) {
  return (
    <section className="max-w-6xl mx-auto px-4 py-12 sm:py-16">

        {/* Section 3a: Live Voice Call Simulator (ElevenLabs) */}
        <VoiceSimulator activeLT={activeLT} />

        {/* Section 3b: Text-Based Call Simulator */}

          <div className="flex items-center gap-3 mb-2">
            <span className="text-2xl">{'\ud83c\udfaf'}</span>
            <h3 className="text-lg font-semibold text-white">Practice This Call (Text)</h3>
          </div>
          <p className="text-sm text-gray-400 mb-4">
            Prefer typing? Practice against a realistic AI prospect via text chat. Get scored on your opening, discovery, coverage pitch, and close.

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {LEAD_TYPES.map(lt => (
              <div key={lt.id} className="bg-gray-800/50 border border-gray-700 rounded-lg p-3">
                <div className="flex items-center gap-2 mb-1">
                  <span>{lt.icon}</span>
                  <span className="text-sm font-semibold text-white">{lt.name}</span>
                </div>
                <p className="text-xs text-gray-500 mb-1">{PERSONA_INTROS[lt.id] || ''}</p>
                <CallSimulator leadTypeId={lt.id} />

}

function Footer() {
  return (
    <footer className="bg-navy border-t border-gray-800 py-8">
      <div className="max-w-6xl mx-auto px-4 text-center">
        <p className="text-gray-500 text-sm">
          Powered by <a href="https://datasignalai.tech" className="text-accent hover:underline">DataSignal AI</a> | datasignalai.tech

        <p className="text-gray-600 text-xs mt-2">
          AI-sourced trigger alerts from FL public records. Fresh daily.

const VOICE_AGENTS = {
  'new_business': { id: 'agent_5601kn4zfgtjedytwha77sm6vxme', name: 'Maria Rodriguez', desc: 'New LLC owner, cleaning service in Miami-Dade' },
  'new_homeowner': { id: 'agent_0401kn50qh3aed7vsxn1ehnevqz9', name: 'Marcus Thompson', desc: 'Just closed on a $425K home in Broward' },
  'wc_stop_work': { id: 'agent_5101kn51efpffmxssxcd9qdsh4g1', name: 'Carlos Delgado', desc: 'Concrete contractor, WC stop-work order in Hillsborough' },
};

function VoiceSimulator({ activeLT }) {
  const widgetRef = useRef(null);
  const agent = activeLT ? VOICE_AGENTS[activeLT.id] : VOICE_AGENTS['new_business'];
  const agentId = agent ? agent.id : VOICE_AGENTS['new_business'].id;
  const agentName = agent ? agent.name : 'Maria Rodriguez';
  const agentDesc = agent ? agent.desc : 'New LLC owner, cleaning service in Miami-Dade';

  const [callActive, setCallActive] = useState(false);

  useEffect(() => {
    if (callActive && widgetRef.current) {
      widgetRef.current.innerHTML = '';
      const el = document.createElement('elevenlabs-convai');
      el.setAttribute('agent-id', agentId);
      // Force the widget to show expanded inline instead of floating bottom-right
      el.style.position = 'relative';
      el.style.display = 'block';
      el.style.width = '100%';
      el.style.minHeight = '80px';
      widgetRef.current.appendChild(el);

      // Auto-click the widget's call button after it renders
      setTimeout(() => {
        const shadowRoot = el.shadowRoot;
        if (shadowRoot) {
          const callBtn = shadowRoot.querySelector('button');
          if (callBtn) callBtn.click();
        }
      }, 1000);
    } else if (!callActive && widgetRef.current) {
      widgetRef.current.innerHTML = '';
      // Also remove any floating widget that ElevenLabs may have created
      document.querySelectorAll('elevenlabs-convai').forEach(w => {
        if (!widgetRef.current || !widgetRef.current.contains(w)) w.remove();
      });
    }
  }, [agentId, callActive]);

  const endCall = () => {
    setCallActive(false);
    if (widgetRef.current) widgetRef.current.innerHTML = '';
  };

  return (
    <div className="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 border border-blue-700/50 rounded-xl p-5 mb-6">
      <div className="flex items-center gap-3 mb-2">
        <span className="text-2xl">{'\ud83d\udcde'}</span>
        <h3 className="text-lg font-semibold text-white">Live Voice Practice Call</h3>
        <span className="text-xs bg-blue-600/30 text-blue-300 px-2 py-0.5 rounded-full">NEW</span>
      </div>
      <p className="text-sm text-gray-400 mb-2">
        Talk to <span className="text-white font-semibold">{agentName}</span> using your actual voice.
      </p>
      <p className="text-xs text-gray-500 mb-4">{agentDesc}.</p>

      {!callActive ? (
        <button onClick={() => { trackEvent('start_voice_call', 'simulator', agentName); setCallActive(true); }}
          className="w-full flex items-center justify-center gap-2 px-5 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold rounded-lg transition-all text-sm shadow-lg shadow-blue-900/30">
          <span>{'\ud83d\udcde'}</span> Start Voice Call with {agentName}
        </button>
      ) : (
        <div>
          <div className="flex items-center justify-between mb-3">
            <span className="text-sm text-green-400 flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Call active with {agentName}
            </span>
            <button onClick={endCall}
              className="text-xs px-3 py-1 bg-red-600/20 text-red-400 hover:bg-red-600/40 rounded transition-colors">
              End Call
            </button>
          </div>
          <div ref={widgetRef}></div>
        </div>
      )}
    </div>
  );
}

function EmailGateModal({ onUnlock, onClose }) {
  const [email, setEmail] = useState('');
  const [name, setName] = useState('');
  const [county, setCounty] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  const counties = [
    'Miami-Dade','Broward','Palm Beach','Hillsborough','Orange','Pinellas',
    'Duval','Lee','Polk','Brevard','Volusia','Seminole','Sarasota',
    'Pasco','Manatee','Collier','Marion','Escambia','Leon','St. Lucie',
    'Osceola','Alachua','Clay','St. Johns','Okaloosa','Hernando',
    'Lake','Charlotte','Santa Rosa','Bay','Martin','Other'
  ];

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email) { setError('Email is required'); return; }
    setSubmitting(true);
    setError('');
    try {
      await fetch('/api/newsletter-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          first_name: name,
          primary_county: county,
          source: 'scripts_gate'
        })
      });
      localStorage.setItem('ds_scripts_unlocked', 'true');
      trackEvent('scripts_unlock', 'lead_capture', county || 'no_county');
      onUnlock();
    } catch (err) {
      localStorage.setItem('ds_scripts_unlocked', 'true');
      onUnlock();
    }
    setSubmitting(false);
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-navyLight border border-gray-700 rounded-2xl max-w-md w-full p-8" onClick={e => e.stopPropagation()}>
        <h3 className="text-xl font-bold text-white mb-2">Unlock All 6 Script Packages</h3>
        <p className="text-gray-400 text-sm mb-6">
          Full phone scripts, objection handling, voicemail templates, and follow-up cadences for every lead type. Enter your email to unlock instantly.
        </p>
        <form onSubmit={handleSubmit}>
          <input
            type="email" required placeholder="Your email" value={email}
            onChange={e => setEmail(e.target.value)}
            className="w-full mb-3 px-4 py-3 bg-navy border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-accent"
          />
          <input
            type="text" placeholder="First name (optional)" value={name}
            onChange={e => setName(e.target.value)}
            className="w-full mb-3 px-4 py-3 bg-navy border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-accent"
          />
          <select
            value={county} onChange={e => setCounty(e.target.value)}
            className="w-full mb-4 px-4 py-3 bg-navy border border-gray-600 rounded-lg text-gray-400 focus:outline-none focus:border-accent"
          >
            <option value="">Your county (optional)</option>
            {counties.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
          <button
            type="submit" disabled={submitting}
            className="w-full py-3 bg-accent hover:bg-accentHover text-white font-semibold rounded-lg transition-colors"
          >
            {submitting ? 'Unlocking...' : 'Unlock Scripts Free'}
          </button>
        </form>
        <p className="text-gray-500 text-xs mt-4 text-center">
          Also subscribes you to weekly FL filing alerts. Unsubscribe anytime.
        </p>
      </div>
    </div>
  );
}

function App() {
  const [active, setActive] = useState(null);
  const [unlocked, setUnlocked] = useState(() => localStorage.getItem('ds_scripts_unlocked') === 'true');
  const [showGate, setShowGate] = useState(false);
  const detailRef = useRef(null);

  useEffect(() => {
    if (active !== null && detailRef.current) {
      setTimeout(() => {
        detailRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  }, [active]);

  const handleCardClick = (i) => {
    if (!unlocked) {
      setShowGate(true);
      trackEvent('scripts_gate_shown', 'lead_capture', LEAD_TYPES[i].name);
      return;
    }
    setActive(active === i ? null : i);
  };

  const handleUnlock = () => {
    setUnlocked(true);
    setShowGate(false);
  };

  const activeLT = active !== null ? LEAD_TYPES[active] : null;

  return (
    <div className="min-h-screen flex flex-col">
      <Header />

      {/* Lead type grid */}
      <section className="max-w-6xl mx-auto px-4 py-8 sm:py-12 w-full">
        <h2 className="text-lg font-semibold text-gray-300 mb-6">Choose a lead type to get your full script package:</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {LEAD_TYPES.map((lt, i) => (
            <LeadTypeCard
              key={lt.id}
              lt={lt}
              isActive={active === i}
              onClick={() => handleCardClick(i)}
            />
          ))}
        </div>
        {!unlocked && (
          <p className="text-center text-gray-500 text-sm mt-4">
            Enter your email to unlock all scripts, objection handling, and follow-up cadences.
          </p>
        )}
      </section>

      {/* Email gate modal */}
      {showGate && <EmailGateModal onUnlock={handleUnlock} onClose={() => setShowGate(false)} />}

      {/* Script detail */}
      {activeLT && (
        <section ref={detailRef} className="max-w-6xl mx-auto px-4 pb-8 w-full">
          <ScriptDetail lt={activeLT} />
        </section>
      )}

      <CrossSellCTA activeLT={activeLT} />
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
